<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>citrix-clip-bridge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <p class="hero-brand">citrix-clip-bridge</p>
        <div class="hero-right">
          <div class="hero-summary">
            <span class="hero-chip">模式 <strong id="selectedMode">Copy</strong></span>
            <span class="hero-chip">状态 <strong id="modeState">已停止</strong></span>
            <span id="appState" class="hero-text">Copy 模式已停止</span>
          </div>
          <div class="hero-actions">
            <button id="startSelectedButton" class="button primary button-compact">启动</button>
            <button id="stopSelectedButton" class="button secondary button-compact">停止</button>
          </div>
        </div>
      </header>

      <main class="grid">
        <section class="panel panel-config">
          <div class="panel-head">
            <h2>同步配置</h2>
            <button id="saveConfigButton" class="button primary">保存配置</button>
          </div>

          <div class="mode-picker">
            <label class="mode-card">
              <input type="radio" name="runMode" value="copy" />
              <span class="mode-card-title">Copy 模式</span>
              <span class="mode-card-copy">监听本机剪贴板并写入 SYNC_FILE</span>
            </label>
            <label class="mode-card">
              <input type="radio" name="runMode" value="paste" />
              <span class="mode-card-title">Paste 模式</span>
              <span class="mode-card-copy">监听 SOURCE_FILE 并回写剪贴板</span>
            </label>
          </div>

          <div id="copyConfigPanel" class="mode-panel">
            <label class="field">
              <span>SYNC_FILE</span>
              <input id="syncFile" type="text" placeholder="写入端目标文件" />
            </label>

            <label class="field">
              <span>COPY_POLL_MS</span>
              <input id="copyPollMs" type="number" min="50" step="50" placeholder="500" />
            </label>
          </div>

          <div id="pasteConfigPanel" class="mode-panel">
            <label class="field">
              <span>SOURCE_FILE</span>
              <input id="sourceFile" type="text" placeholder="读取端源文件" />
            </label>

            <div class="field-row">
              <label class="field">
                <span>PASTE_POLL_MS</span>
                <input id="pastePollMs" type="number" min="50" step="50" placeholder="500" />
              </label>
              <label class="field">
                <span>HEARTBEAT_MS</span>
                <input id="heartbeatMs" type="number" min="1000" step="500" placeholder="5000" />
              </label>
            </div>
          </div>

          <label class="toggle">
            <input id="launchAtLogin" type="checkbox" />
            <span>开机自启动</span>
          </label>

          <p id="saveMessage" class="hint">修改后保存，运行中的服务会按新配置重建。</p>
        </section>

        <section class="panel logs panel-logs">
          <div class="panel-head">
            <h2>日志</h2>
            <button id="clearLogsButton" class="button ghost">清空日志缓冲</button>
          </div>
          <div id="logs" class="log-list"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
  </html>
